name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip python3-setuptools git cmake zip unzip openjdk-11-jdk autoconf libtool pkg-config
          pip3 install --user buildozer cython==0.29.33
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Fix libtool macros
        run: |
          # Try multiple possible paths for libtool macros
          if [ -d /usr/share/libtool/aclocal ]; then
            sudo cp /usr/share/libtool/aclocal/*.m4 /usr/share/aclocal/ 2>/dev/null || true
          fi
          if [ -d /usr/share/aclocal-1.16 ]; then
            sudo cp /usr/share/aclocal-1.16/*.m4 /usr/share/aclocal/ 2>/dev/null || true
          fi
          # Install libtool if missing
          sudo apt-get install -y libtool 2>/dev/null || true

      - name: Build with Buildozer
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: bin/*.apk

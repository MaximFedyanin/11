name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04  # Используем стабильную версию
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          sudo apt-get update
          # Устанавливаем Java 17, необходимую для API 33
          sudo apt-get install -y python3-pip python3-setuptools git cmake zip unzip openjdk-17-jdk autoconf automake libtool pkg-config m4
          pip3 install --user buildozer cython==0.29.33
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build with Buildozer
        env:
          # Явно указываем Java 17 для Gradle
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          # Выделяем 4 ГБ памяти для Gradle, чтобы избежать падения
          GRADLE_OPTS: "-Xmx4g -XX:MaxPermSize=2g"
        run: |
          # Активируем настройки в сессии
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH
          
          # Запуск сборки
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: bin/*.apk

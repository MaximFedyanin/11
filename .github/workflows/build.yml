name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip python3-setuptools git cmake zip unzip openjdk-17-jdk autoconf automake libtool pkg-config m4 clang llvm
          pip3 install --user buildozer cython==0.29.33
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Fix libtool macros (libffi) and configure NDK
        run: |
          sudo cp /usr/share/libtool/build-aux/m4/*.m4 /usr/share/aclocal/ 2>/dev/null || true
          sudo cp /usr/share/libtool/m4/*.m4 /usr/share/aclocal/ 2>/dev/null || true

          # Set up NDK environment variables for the entire workflow
          export ANDROID_NDK_HOME=$HOME/.buildozer/android/platform/android-ndk-r25b
          export NDK_HOME=$ANDROID_NDK_HOME
          export PATH=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH

          # Verify clang is accessible from NDK
          which clang || echo "Warning: clang not found in PATH yet"

          # Export for subsequent steps
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV
          echo "NDK_HOME=$NDK_HOME" >> $GITHUB_ENV
          echo "PATH=$PATH" >> $GITHUB_ENV

      - name: Configure C compiler for NDK r25b
        run: |
          # Explicitly set compiler variables for arm64-v8a architecture
          # This fixes "C compiler cannot create executables" error with NDK r25b
          export CC=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang
          export CXX=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang++
          export AR=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          export RANLIB=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ranlib
          export STRIP=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip

          # Verify compilers exist
          echo "CC=$CC"
          echo "CXX=$CXX"
          ls -la $CC || echo "Warning: CC compiler not found"
          ls -la $CXX || echo "Warning: CXX compiler not found"

          # Export to GITHUB_ENV for build step
          echo "CC=$CC" >> $GITHUB_ENV
          echo "CXX=$CXX" >> $GITHUB_ENV
          echo "AR=$AR" >> $GITHUB_ENV
          echo "RANLIB=$RANLIB" >> $GITHUB_ENV
          echo "STRIP=$STRIP" >> $GITHUB_ENV

      - name: Configure Java & Gradle for CI
        run: |
          # 1. Жёстко фиксируем Java 17
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH
          java -version

          # 2. Отключаем Gradle Daemon и увеличиваем память
          export GRADLE_OPTS="-Xmx4g -XX:MaxMetaspaceSize=2g -Dorg.gradle.daemon=false"
          export GRADLE_USER_HOME=$HOME/.gradle

          # 3. Создаём gradle.properties с гарантированными настройками
          mkdir -p ~/.gradle
          cat > ~/.gradle/gradle.properties << EOF
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=2g
          org.gradle.daemon=false
          org.gradle.caching=true
          org.gradle.configureondemand=true
          EOF

      - name: Build with Buildozer
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          P4A_JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=2g -Dorg.gradle.daemon=false"
        run: |
          # Set compiler environment variables from previous step exports
          export CC=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang
          export CXX=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang++
          export AR=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          export RANLIB=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ranlib
          export STRIP=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip

          # Verify NDK compiler is available
          which aarch64-linux-android21-clang || echo "Warning: Target compiler not in PATH"

          # Очищаем кэш Gradle внутри dist, чтобы исключить конфликты состояний
          rm -rf ~/.buildozer/android/platform/build-arm64-v8a/dists/englishlearning/.gradle 2>/dev/null || true

          # Запускаем сборку
          buildozer android debug

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: bin/*.apk
